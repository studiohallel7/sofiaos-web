<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SofiaOS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0e0b08;--s1:#161210;--s2:#1d1814;--s3:#252019;--s4:#2e271f;
  --a:#bf8540;--a2:#d4974e;--a3:#e8b06a;
  --adim:rgba(191,133,64,0.11);--abor:rgba(191,133,64,0.2);
  --t0:#ede7de;--t1:#b8ae9e;--t2:#7a7068;--t3:#4a4238;
  --ok:#3d8f5f;--err:#a04444;
  --sb:38px;--dock:66px;--r:12px;--rb:18px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t0);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Inter',sans-serif;font-size:13px}
.wp{position:fixed;inset:0;z-index:0}
.wp svg{width:100%;height:100%}
.statusbar{position:fixed;top:0;left:0;right:0;height:var(--sb);
  background:rgba(14,11,8,0.72);border-bottom:1px solid rgba(191,133,64,0.08);
  display:flex;align-items:center;padding:0 16px;gap:10px;z-index:1000}
.sb-logo{font-size:14px;font-weight:700;letter-spacing:-.3px}
.sb-logo span{color:var(--a3)}
.sb-time{position:absolute;left:50%;transform:translateX(-50%);font-size:13px;font-weight:600;color:var(--t1)}
.sb-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.sb-stat{font-size:11px;color:var(--t2)}
.sb-stat b{color:var(--t1);font-weight:500}
.desktop{position:fixed;top:var(--sb);left:0;right:0;bottom:var(--dock);z-index:10;overflow:hidden}
.homescreen{position:absolute;inset:0;display:flex;flex-direction:column;padding:20px 16px 10px;overflow-y:auto}
.homescreen::-webkit-scrollbar{display:none}
.widgets{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
@media(max-width:600px){.widgets{grid-template-columns:repeat(2,1fr)}}
.widget{background:rgba(22,18,14,0.82);border:1px solid rgba(191,133,64,0.13);
  border-radius:var(--rb);padding:13px;cursor:pointer;transition:transform .15s}
.widget:active{transform:scale(.97)}
.wlbl{font-size:9px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--t3);margin-bottom:8px}
.wval{font-size:24px;font-weight:300;color:var(--t0);letter-spacing:-.5px;line-height:1}
.wunit{font-size:12px;color:var(--t2)}
.wbar{height:3px;background:var(--s4);border-radius:2px;margin-top:8px}
.wbar-f{height:100%;border-radius:2px;background:var(--a);transition:width .6s}
.wbar-f.ok{background:var(--ok)}
.wnote{font-size:10px;color:var(--t3);margin-top:4px}
.apps-title{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--t3);margin-bottom:12px;padding:0 4px}
.app-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px 8px;margin-bottom:16px}
@media(max-width:700px){.app-grid{grid-template-columns:repeat(5,1fr)}}
@media(max-width:500px){.app-grid{grid-template-columns:repeat(4,1fr)}}
.app{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;user-select:none;-webkit-user-select:none}
.app-box{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;transition:transform .12s;position:relative;flex-shrink:0}
@media(max-width:500px){.app-box{width:46px;height:46px;border-radius:12px}}
.app-box:active{transform:scale(.88)}
.app-box svg{width:21px;height:21px}
.app-lbl{font-size:10px;color:var(--t2);text-align:center;white-space:nowrap;overflow:hidden;max-width:58px;text-overflow:ellipsis}
.app-bdg{position:absolute;top:-3px;right:-3px;min-width:14px;height:14px;border-radius:7px;background:#c03838;border:2px solid var(--bg);font-size:8px;color:#fff;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 2px}
.win{position:absolute;background:var(--s1);border:1px solid rgba(191,133,64,0.18);border-radius:var(--rb);overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.6);z-index:100}
.win.focused{border-color:rgba(191,133,64,0.32);box-shadow:0 24px 80px rgba(0,0,0,.75);z-index:200}
.win.minimized{display:none}
.win.maximized{top:0!important;left:0!important;width:100%!important;height:100%!important;border-radius:0;border:none}
.titlebar{height:38px;flex-shrink:0;background:var(--s2);border-bottom:1px solid rgba(191,133,64,0.1);display:flex;align-items:center;padding:0 10px;gap:7px;cursor:grab;user-select:none;-webkit-user-select:none}
.titlebar:active{cursor:grabbing}
.tb-dots{display:flex;gap:5px}
.tb-dot{width:11px;height:11px;border-radius:50%;cursor:pointer;transition:opacity .15s;flex-shrink:0}
.tb-dot:hover{opacity:.7}
.tb-close{background:#ff5f57}
.tb-min{background:#febc2e}
.tb-max{background:#28c840}
.tb-title{flex:1;text-align:center;font-size:11px;color:var(--t2);font-weight:500;pointer-events:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-icon{width:14px;height:14px;margin-right:4px;flex-shrink:0}
.win-body{flex:1;overflow:hidden;position:relative;min-height:0}
.win-body iframe{width:100%;height:100%;border:none;background:var(--bg)}
.win-loader{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:var(--s1);gap:8px}
.ld{width:6px;height:6px;border-radius:50%;background:var(--a);animation:ldot 1.2s ease-in-out infinite}
.ld:nth-child(2){animation-delay:.2s}
.ld:nth-child(3){animation-delay:.4s}
@keyframes ldot{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
.win-blocked{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:var(--s1);padding:24px;text-align:center}
.win-blocked p{font-size:12px;color:var(--t2);line-height:1.6}
.win-blocked button{padding:8px 20px;background:var(--a);border:none;border-radius:10px;color:#1a0f00;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.native{flex:1;overflow-y:auto;padding:16px;min-height:0}
.native::-webkit-scrollbar{width:3px}
.native::-webkit-scrollbar-thumb{background:var(--s4)}
.term-out{font-family:'SF Mono','Fira Code',monospace;font-size:12px;color:#c8bfb0;line-height:1.6;white-space:pre-wrap;word-break:break-all;min-height:160px;margin-bottom:8px}
.term-in{display:flex;align-items:center;gap:8px;padding:8px;background:rgba(0,0,0,.3);border-radius:8px}
.term-prompt{color:var(--a3);font-family:monospace;font-size:12px;flex-shrink:0}
.term-field{flex:1;background:transparent;border:none;outline:none;color:var(--t0);font-size:12px;font-family:monospace}
.cbtn{padding:5px 11px;border:none;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0}
.vrow{display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid rgba(191,133,64,0.07)}
.vrow:last-child{border:none}
.vlbl{font-size:12px;color:var(--t1);min-width:55px}
.vbar{flex:1;height:4px;background:var(--s4);border-radius:2px}
.vfill{height:100%;border-radius:2px;transition:width .6s}
.vval{font-size:11px;color:var(--t2);min-width:50px;text-align:right}
.vpill{font-size:9px;font-weight:700;padding:2px 7px;border-radius:100px;background:rgba(61,143,95,.14);color:#5bb87a;border:1px solid rgba(61,143,95,.2)}
.dock{position:fixed;bottom:0;left:0;right:0;height:var(--dock);display:flex;align-items:center;justify-content:center;padding:0 16px 6px;z-index:1000}
.dock-inner{display:flex;align-items:center;gap:6px;padding:6px 12px;background:rgba(18,14,10,0.88);border:1px solid var(--abor);border-radius:22px;max-width:100%;overflow-x:auto}
.dock-inner::-webkit-scrollbar{display:none}
.dk{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;flex-shrink:0;transition:transform .15s}
.dk:hover{transform:translateY(-4px) scale(1.08)}
.dk:active{transform:scale(.85)}
.dk svg{width:18px;height:18px}
.dk-d{position:absolute;bottom:-5px;width:4px;height:4px;border-radius:50%;background:var(--a3)}
.dk-sep{width:1px;height:24px;background:rgba(191,133,64,0.15);margin:0 2px;flex-shrink:0}
@media(max-width:768px){.titlebar{cursor:default}.win.maximized{border-radius:0!important}}
</style>
</head>
<body>

<div class="wp">
<svg viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="800" fill="#0e0b08"/>
  <ellipse cx="900" cy="180" rx="500" ry="320" fill="#190e04" opacity=".6"/>
  <ellipse cx="150" cy="650" rx="380" ry="250" fill="#110d06" opacity=".45"/>
  <circle cx="950" cy="150" r="160" fill="none" stroke="#bf8540" stroke-width=".5" opacity=".07"/>
</svg>
</div>

<div class="statusbar">
  <span class="sb-logo">Sofia<span>OS</span></span>
  <span class="sb-time" id="clock">--:--</span>
  <div class="sb-right">
    <span class="sb-stat">CPU <b id="sbCpu">…</b></span>
    <span class="sb-stat">RAM <b id="sbRam">…</b></span>
    <span class="sb-stat" id="sbUptimeWrap" style="display:none">up <b id="sbUp">…</b></span>
  </div>
</div>

<div class="desktop" id="desktop">
  <div class="homescreen" id="homescreen">
    <div class="widgets">
      <div class="widget" onclick="openApp('metrics')">
        <div class="wlbl">CPU</div>
        <div><span class="wval" id="wCpu">0</span><span class="wunit">%</span></div>
        <div class="wbar"><div class="wbar-f ok" id="wCpuBar" style="width:0%"></div></div>
        <div class="wnote">oracle vps</div>
      </div>
      <div class="widget" onclick="openApp('metrics')">
        <div class="wlbl">RAM</div>
        <div><span class="wval" id="wRam">…</span><span class="wunit">MB</span></div>
        <div class="wbar"><div class="wbar-f" id="wRamBar" style="width:0%"></div></div>
        <div class="wnote" id="wRamNote">de 1024MB</div>
      </div>
      <div class="widget" onclick="openApp('metrics')">
        <div class="wlbl">Uptime</div>
        <div><span class="wval" id="wUp" style="font-size:18px">…</span></div>
        <div class="wbar"><div class="wbar-f ok" style="width:100%"></div></div>
        <div class="wnote" style="color:var(--ok)">sistema nominal</div>
      </div>
    </div>
    <div class="apps-title">Apps</div>
    <div class="app-grid" id="appGrid"></div>
  </div>
</div>

<div class="dock">
  <div class="dock-inner" id="dockInner">
    <div class="dk" style="background:#0f1a0f" onclick="goHome()">
      <svg viewBox="0 0 22 22" fill="none" stroke="#4a9e6a" stroke-width="1.5"><path d="M2 9L11 2l9 7v11H2V9z"/></svg>
    </div>
    <div class="dk-sep"></div>
    <div id="dockApps" style="display:contents"></div>
    <div class="dk-sep"></div>
    <div class="dk" style="background:#1a1a1a" onclick="openApp('terminal')">
      <svg viewBox="0 0 22 22" fill="none" stroke="#8a8a8a" stroke-width="1.5"><rect x="2" y="4" width="18" height="14" rx="2"/><path d="M6 9l3 3-3 3M12 15h5"/></svg>
    </div>
    <div class="dk" style="background:#141820" onclick="openApp('metrics')">
      <svg viewBox="0 0 22 22" fill="none" stroke="#4a7abf" stroke-width="1.5"><rect x="1" y="4" width="20" height="6" rx="1"/><rect x="1" y="12" width="20" height="6" rx="1"/><circle cx="18" cy="7" r="1" fill="#4a7abf"/><circle cx="18" cy="15" r="1" fill="#4a7abf"/></svg>
    </div>
  </div>
</div>

<script>
const APPS=[
  {id:'workspace',label:'Workspace',bg:'#251e10',stroke:'#bf8540',url:'https://studiohallel.online/workspace.html',icon:'<rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="12" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="12" width="7" height="7" rx="1.5"/><rect x="12" y="12" width="7" height="7" rx="1.5"/>'},
  {id:'reunioes',label:'Reuniões',bg:'#1a1e2a',stroke:'#4a7abf',url:'https://studiohallel.online/reunioes.html',icon:'<rect x="2" y="5" width="18" height="14" rx="2"/><path d="M2 10h18M8 5V3M14 5V3"/>'},
  {id:'galene',label:'Galene',bg:'#1c2a1a',stroke:'#4a9e6a',url:'https://conference.studiohallel.online:8443/group/equipe/',badge:'●',icon:'<rect x="2" y="4" width="14" height="10" rx="2"/><path d="M16 8l4-2v8l-4-2V8z"/>'},
  {id:'sofia',label:'Sofia IA',bg:'#221420',stroke:'#9b59b6',url:'https://studiohallel.online/sofia.html',icon:'<circle cx="11" cy="9" r="4"/><path d="M4 20c0-3.3 3.1-6 7-6s7 2.7 7 6"/>'},
  {id:'admin',label:'Admin',bg:'#1a1210',stroke:'#bf6040',url:'https://studiohallel.online/admin.html',icon:'<circle cx="11" cy="11" r="4"/><path d="M11 2v3M11 17v3M2 11h3M17 11h3"/>'},
  {id:'vendas',label:'Vendas',bg:'#101a10',stroke:'#40a060',url:'https://studiohallel.online/vendas.html',icon:'<path d="M3 18L8 8l4 5 3-4 4 9"/>'},
  {id:'qualidade',label:'QA',bg:'#1a1820',stroke:'#7a7abf',url:'https://studiohallel.online/qualidade.html',icon:'<path d="M11 2l2.4 6.6H20l-5.7 4.1 2.2 6.8L11 15.4l-5.5 4.1 2.2-6.8L2 8.6h6.6z"/>'},
  {id:'command',label:'Command',bg:'#1a1212',stroke:'#bf4040',url:'https://studiohallel.online/command.html',icon:'<circle cx="11" cy="11" r="8"/><path d="M11 7v4l3 3"/>'},
  {id:'terminal',label:'Terminal',bg:'#1a1a1a',stroke:'#8a8a8a',native:true,icon:'<rect x="2" y="4" width="18" height="14" rx="2"/><path d="M6 9l3 3-3 3M12 15h5"/>'},
  {id:'metrics',label:'Métricas',bg:'#141820',stroke:'#4a7abf',native:true,icon:'<rect x="1" y="4" width="20" height="6" rx="1"/><rect x="1" y="12" width="20" height="6" rx="1"/><circle cx="18" cy="7" r="1" fill="#4a7abf"/><circle cx="18" cy="15" r="1" fill="#4a7abf"/>'},
  {id:'oracle',label:'Oracle',bg:'#141820',stroke:'#4a7abf',url:'https://cloud.oracle.com',external:true,icon:'<path d="M6 16a4 4 0 0 1 0-8h1a5 5 0 0 1 9 2h1a3 3 0 0 1 0 6H6z"/>'},
  {id:'cloudflare',label:'Cloudflare',bg:'#1e1608',stroke:'#e8a857',url:'https://dash.cloudflare.com',external:true,icon:'<path d="M15 14.5s1.5-.5 1.5-2.5-2-3-3.5-2.5c0-2-1.5-4-4-4S5 7 5 9.5C3.5 9.5 2 10.5 2 12.5S3.5 14.5 5 14.5"/>'},
  {id:'github',label:'GitHub',bg:'#141414',stroke:'#aaaaaa',url:'https://github.com/studiohallel7',external:true,icon:'<path d="M11 2C6 2 2 6 2 11c0 4 2.6 7.4 6.2 8.6.5.1.6-.2.6-.5v-1.7c-2.6.6-3.1-1.3-3.1-1.3-.4-1.1-1-1.4-1-1.4-.9-.6.1-.6.1-.6 1 .1 1.5 1 1.5 1 .9 1.5 2.3 1.1 2.8.8.1-.6.3-1.1.6-1.3-2.1-.2-4.3-1-4.3-4.7 0-1 .4-1.9 1-2.6-.1-.2-.4-1.2.1-2.5 0 0 .8-.3 2.7 1a9.3 9.3 0 0 1 5 0c1.9-1.3 2.7-1 2.7-1 .5 1.3.2 2.3.1 2.5.6.7 1 1.6 1 2.6 0 3.7-2.2 4.5-4.3 4.7.3.3.6.9.6 1.8v2.6c0 .3.1.6.6.5C17.4 18.4 20 15 20 11c0-5-4-9-9-9z"/>'},
];

// render app grid
const grid=document.getElementById('appGrid');
APPS.forEach(a=>{
  const el=document.createElement('div');
  el.className='app';
  el.innerHTML=`<div class="app-box" style="background:${a.bg}" onclick="openApp('${a.id}')"><svg width="21" height="21" viewBox="0 0 22 22" fill="none" stroke="${a.stroke}" stroke-width="1.5">${a.icon}</svg>${a.badge?`<div class="app-bdg">${a.badge}</div>`:''}</div><span class="app-lbl">${a.label}</span>`;
  grid.appendChild(el);
});

// window manager
const wins={};
let zTop=200;
const mob=()=>window.innerWidth<=768;

function openApp(id){
  const a=APPS.find(x=>x.id===id);
  if(!a) return;
  if(a.external){window.open(a.url,'_blank');return;}
  if(wins[id]){wins[id].classList.remove('minimized');focusWin(id);return;}
  const desk=document.getElementById('desktop');
  const dw=desk.offsetWidth,dh=desk.offsetHeight;
  let w=mob()?dw:Math.min(980,dw*.85);
  let h=mob()?dh:Math.min(700,dh*.88);
  const ox=Object.keys(wins).length;
  const x=mob()?0:Math.max(0,Math.min((dw-w)/2+ox*22,dw-w));
  const y=mob()?0:Math.max(0,Math.min((dh-h)/2+ox*22,dh-h));
  const win=document.createElement('div');
  win.className='win focused';
  win.id='win-'+id;
  win.style.cssText=`width:${w}px;height:${h}px;left:${x}px;top:${y}px`;
  // titlebar
  const tb=document.createElement('div');
  tb.className='titlebar';
  tb.innerHTML=`<div class="tb-dots"><div class="tb-dot tb-close" onclick="closeWin('${id}')"></div><div class="tb-dot tb-min" onclick="minWin('${id}')"></div><div class="tb-dot tb-max" onclick="maxWin('${id}')"></div></div><svg class="tb-icon" viewBox="0 0 22 22" fill="none" stroke="${a.stroke}" stroke-width="1.5">${a.icon}</svg><div class="tb-title">${a.label}</div>`;
  win.appendChild(tb);
  // body
  const body=document.createElement('div');
  body.className='win-body';
  if(a.native){
    const na=document.createElement('div');
    na.className='native';
    if(id==='terminal') na.innerHTML=termHTML();
    if(id==='metrics') na.innerHTML=metricsHTML();
    body.appendChild(na);
    win.appendChild(body);
    if(id==='metrics') setTimeout(renderMetrics,80);
  } else {
    const loader=document.createElement('div');
    loader.className='win-loader';
    loader.innerHTML='<div class="ld"></div><div class="ld"></div><div class="ld"></div>';
    body.appendChild(loader);
    const fr=document.createElement('iframe');
    fr.src=a.url;
    fr.style.cssText='opacity:0;transition:opacity .3s';
    fr.allow='camera;microphone;display-capture;fullscreen';
    fr.setAttribute('sandbox','allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-downloads allow-presentation');
    fr.onload=()=>{loader.style.display='none';fr.style.opacity='1';};
    body.appendChild(fr);
    setTimeout(()=>{if(fr.style.opacity==='0')blocked(body,a);},9000);
    win.appendChild(body);
  }
  if(!mob()) drag(win,tb);
  win.addEventListener('mousedown',()=>focusWin(id));
  desk.appendChild(win);
  wins[id]=win;
  addDk(id,a);
}

function blocked(body,a){
  body.innerHTML=`<div class="win-blocked"><p><b style="color:var(--t1)">${a.label}</b> bloqueou o iframe.<br>Política de segurança do servidor.</p><button onclick="window.open('${a.url}','_blank')">Abrir em nova aba ↗</button></div>`;
}
function closeWin(id){wins[id]?.remove();delete wins[id];document.getElementById('dk-'+id)?.remove();if(id==='terminal'&&ws){ws.close();ws=null;}}
function minWin(id){wins[id]?.classList.add('minimized');}
function maxWin(id){wins[id]?.classList.toggle('maximized');}
function focusWin(id){Object.values(wins).forEach(w=>w.classList.remove('focused'));if(wins[id]){wins[id].classList.add('focused');wins[id].style.zIndex=++zTop;}}
function goHome(){Object.values(wins).forEach(w=>w.classList.add('minimized'));}

function drag(win,handle){
  let ox,oy,on=false;
  handle.addEventListener('mousedown',e=>{
    if(e.target.classList.contains('tb-dot'))return;
    on=true;ox=e.clientX-win.offsetLeft;oy=e.clientY-win.offsetTop;e.preventDefault();
  });
  document.addEventListener('mousemove',e=>{
    if(!on)return;
    const d=document.getElementById('desktop');
    win.style.left=Math.max(0,Math.min(e.clientX-ox,d.offsetWidth-win.offsetWidth))+'px';
    win.style.top=Math.max(0,Math.min(e.clientY-oy,d.offsetHeight-win.offsetHeight))+'px';
  });
  document.addEventListener('mouseup',()=>{on=false;});
}

function addDk(id,a){
  if(document.getElementById('dk-'+id))return;
  const da=document.getElementById('dockApps');
  const dk=document.createElement('div');
  dk.className='dk';dk.id='dk-'+id;dk.style.background=a.bg;dk.title=a.label;
  dk.innerHTML=`<svg viewBox="0 0 22 22" fill="none" stroke="${a.stroke}" stroke-width="1.5">${a.icon}</svg><div class="dk-d"></div>`;
  dk.onclick=()=>{
    const w=wins[id];
    if(w?.classList.contains('minimized')){w.classList.remove('minimized');focusWin(id);}
    else if(w) w.classList.add('minimized');
  };
  da.appendChild(dk);
}

// terminal
let ws=null;
function termHTML(){
  return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><span style="font-size:14px;font-weight:600;color:var(--t0)">bash · galena</span><span id="tSt" style="font-size:10px;padding:2px 8px;border-radius:100px;background:rgba(160,68,68,.15);color:#c07070;border:1px solid rgba(160,68,68,.2)">desconectado</span></div><div class="term-out" id="tOut">[sofiaos] pronto\n</div><div class="term-in"><span class="term-prompt">$</span><input class="term-field" id="tIn" placeholder="conecte para digitar..." onkeydown="tKey(event)" disabled><button class="cbtn" id="tBtn" onclick="tToggle()" style="background:var(--a);color:#1a0f00">Conectar</button></div>`;
}
function tToggle(){
  if(ws){ws.close();return;}
  const out=document.getElementById('tOut'),inp=document.getElementById('tIn'),btn=document.getElementById('tBtn'),st=document.getElementById('tSt');
  if(!out)return;
  const proto=location.protocol==='https:'?'wss':'ws';
  ws=new WebSocket(`${proto}://${location.host}/api/terminal`);
  ws.binaryType='arraybuffer';
  ws.onopen=()=>{st.textContent='conectado';st.style.cssText='font-size:10px;padding:2px 8px;border-radius:100px;background:rgba(61,143,95,.15);color:#5bb87a;border:1px solid rgba(61,143,95,.2)';btn.textContent='Desconectar';btn.style.cssText='background:var(--err);color:#fff;padding:5px 11px;border:none;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit';inp.disabled=false;inp.focus();out.textContent='';};
  ws.onmessage=e=>{const t=e.data instanceof ArrayBuffer?new TextDecoder().decode(e.data):e.data;out.textContent+=t;out.scrollTop=out.scrollHeight;};
  ws.onclose=()=>{st.textContent='desconectado';st.style.cssText='font-size:10px;padding:2px 8px;border-radius:100px;background:rgba(160,68,68,.15);color:#c07070;border:1px solid rgba(160,68,68,.2)';btn.textContent='Conectar';btn.style.cssText='background:var(--a);color:#1a0f00;padding:5px 11px;border:none;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit';inp.disabled=true;ws=null;};
}
function tKey(e){
  if(!ws||ws.readyState!==1)return;
  if(e.key==='Enter'){ws.send(e.target.value+'\n');e.target.value='';e.preventDefault();}
  else if(e.key==='Tab'){ws.send('\t');e.preventDefault();}
  else if(e.ctrlKey&&e.key==='c'){ws.send('\x03');e.preventDefault();}
  else if(e.ctrlKey&&e.key==='l'){document.getElementById('tOut').textContent='';e.preventDefault();}
}

// metrics native
function metricsHTML(){
  return `<div style="font-size:14px;font-weight:600;color:var(--t0);margin-bottom:14px">Oracle VPS · Brazil East</div><div id="mRows"></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px"><div style="background:var(--s2);border-radius:var(--r);padding:12px"><div style="font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px">RAM livre</div><div><span id="mRF" style="font-size:22px;font-weight:300;color:var(--t0)">…</span><span style="font-size:12px;color:var(--t2)">MB</span></div><div style="font-size:10px;color:var(--t3);margin-top:3px">de 1024MB total</div></div><div style="background:var(--s2);border-radius:var(--r);padding:12px"><div style="font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px">Disco livre</div><div><span id="mDF" style="font-size:22px;font-weight:300;color:var(--t0)">…</span><span style="font-size:12px;color:var(--t2)">GB</span></div><div style="font-size:10px;color:var(--t3);margin-top:3px">de ~200GB total</div></div></div>`;
}
function renderMetrics(){
  if(!M)return;
  const rows=[
    {l:'CPU',v:M.cpu_percent+'%',p:M.cpu_percent,c:'var(--ok)'},
    {l:'RAM',v:M.ram_percent+'%',p:M.ram_percent,c:'var(--a)'},
    {l:'Disco',v:M.disk_percent+'%',p:M.disk_percent,c:'var(--ok)'},
    {l:'Load',v:M.load1,p:0,c:'var(--ok)'},
    {l:'Uptime',v:upStr(M.uptime_seconds),p:0,c:'var(--ok)'},
  ];
  const el=document.getElementById('mRows');
  if(el) el.innerHTML=rows.map(r=>`<div class="vrow"><span class="vlbl">${r.l}</span><div class="vbar"><div class="vfill" style="width:${r.p}%;background:${r.c}"></div></div><span class="vval">${r.v}</span><span class="vpill">ok</span></div>`).join('');
  const rf=document.getElementById('mRF');const df=document.getElementById('mDF');
  if(rf)rf.textContent=Math.round(1024-M.ram_used_mb);
  if(df)df.textContent=Math.round(200-M.disk_used_gb);
}

// metrics fetch
let M=null;
function upStr(s){const d=Math.floor(s/86400),h=Math.floor((s%86400)/3600);return d>0?`${d}d ${h}h`:`${h}h`;}
async function fetchM(){
  try{const r=await fetch('/api/metrics');M=await r.json();applyM(M);}catch(e){}
}
function applyM(d){
  const $=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
  const bw=(id,w)=>{const e=document.getElementById(id);if(e)e.style.width=Math.min(w,100)+'%';};
  $('sbCpu',d.cpu_percent+'%');$('sbRam',d.ram_used_mb+'MB');$('sbUp',upStr(d.uptime_seconds));
  document.getElementById('sbUptimeWrap').style.display='';
  $('wCpu',d.cpu_percent);bw('wCpuBar',d.cpu_percent);
  $('wRam',d.ram_used_mb);bw('wRamBar',d.ram_percent);
  $('wUp',upStr(d.uptime_seconds));
  $('wRamNote',d.ram_percent+'% · de 1024MB');
  renderMetrics();
}

function tick(){const n=new Date();document.getElementById('clock').textContent=n.getHours()+':'+String(n.getMinutes()).padStart(2,'0');}
tick();setInterval(tick,10000);
fetchM();setInterval(fetchM,15000);
</script>
